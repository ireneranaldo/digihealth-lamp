# Configurazione per Raspberry con telecamera YOLO e LED NeoPixel
# Disabilita componenti non presenti
sensors:
  microphone:
    enabled: false
  door:
    enabled: true
    gpio_pin: 18
    pull_up_down: up
  window:
    enabled: true
    gpio_pin: 17
    pull_up_down: up
  people_counter:
    enabled: true
    rtsp_url: "rtsp://admin:password@192.168.1.124/profile2/media.smp"
    model_path: "yolov8n.pt"
    frame_width: 640
    frame_height: 480
    show_video: false
    frame_interval: 2

processors:
  audio_comfort:
    enabled: false

actuators:
  neopixel:
    enabled: true  # LED collegati direttamente al Raspberry
  shelly:
    enabled: true  # Shelly presente su WiFi
    ip: "192.168.1.191"
    mode: "presence"

communicator:
  telegraf:
    tags:
      sensor: "ZPHS01B"
      host: "raspberry01"

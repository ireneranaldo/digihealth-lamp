# Configurazione per Raspberry con telecamera YOLO e LED WiFi
# Disabilita componenti non presenti
sensors:
  microphone:
    enabled: false
  people_counter:
    enabled: true
    rtsp_url: "rtsp://admin:password@192.168.1.124/profile2/media.smp"

processors:
  audio_comfort:
    enabled: false

actuators:
  led_wifi:
    enabled: true
    ip: "192.168.1.192"  # IP corretto del LED WiFi
    mode: "circadian"

communicator:
  telegraf:
    tags:
      sensor: "ZPHS01B"
      host: "raspberry01"

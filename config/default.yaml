# DigiHealth Lamp Configuration
sensors:
  zph:
    port: "/dev/serial0"
    baudrate: 9600
    command: [255, 1, 134, 0, 0, 0, 0, 0, 121]
  light:
    i2c_bus: 1
    address: 0x23
  door:
    gpio_pin: 18
  window:
    gpio_pin: 17
  microphone:
    enabled: true
    device_index: null  # Auto-detect

processors:
  iaqi:
    enabled: true
  circadian:
    enabled: true
  audio_comfort:
    enabled: true
    check_duration: 10
    comfort_duration: 300
    tolerance_threshold: 45.0
    critical_threshold: 65.0

actuators:
  neopixel:
    enabled: true
    pin: 12
    num_pixels: 144
    iaqi_range: [0, 79]
    circadian_range: [80, 143]
  shelly:
    enabled: true
    ip: "192.168.1.191"
    username: ""
    password: ""

communicator:
  telegraf:
    enabled: true
    measurement: "ZPHSensor"
    tags:
      sensor: "ZPHS01B"
      host: "raspberry01"
  ipc:
    method: "sqlite"  # or "redis"
    db_path: "/tmp/digihealth.db"

web:
  enabled: false  # Set to true to enable dashboard
  host: "0.0.0.0"
  port: 5000

logging:
  level: "INFO"
  file: "/var/log/digihealth-lamp.log"
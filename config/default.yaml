# DigiHealth Lamp Configuration
sensors:
  zph:
    port: "/dev/serial0"
    baudrate: 9600
    command: [255, 1, 134, 0, 0, 0, 0, 0, 121]
  light:
    i2c_bus: 1
    address: 0x23
  door:
    enabled: true
    gpio_pin: 18
    pull_up_down: up
  window:
    enabled: true
    gpio_pin: 17
    pull_up_down: up
  people_counter:
    enabled: true
    rtsp_url: "rtsp://admin:Artes26!@192.168.1.124/profile2/media.smp"
    model_path: "yolov8n.pt"
    frame_width: 640
    frame_height: 480
    show_video: false  # Set to true to visualize video with bounding boxes
    frame_interval: 2  # Seconds between displayed frames
  microphone:
    enabled: false  #non presente
    device_index: null  # Auto-detect

processors:
  iaqi:
    enabled: true
  circadian:
    enabled: true
  audio_comfort:
    enabled: false  #non presente
    check_duration: 10
    comfort_duration: 300
    tolerance_threshold: 45.0
    critical_threshold: 65.0

actuators:
  neopixel:
    enabled: true  # LED collegati direttamente al Raspberry
    pin: 12  # Pin fisico 12 (GPIO 18) - usa board.D12
    num_pixels: 144
    iaqi_range: [0, 79]
    circadian_range: [80, 143]
  shelly:
    enabled: false #non presente
    ip: "192.168.1.191"
    username: ""
    password: ""
    mode: "presence"
    person_threshold: 1
    iaqi_threshold: 100
  led_wifi:
    enabled: false #non presente
    ip: "192.168.1.192"
    username: ""
    password: ""
    mode: "circadian"
    min_lux: 10
    max_lux: 500

communicator:
  telegraf:
    enabled: true
    url: "https://influxdb1.digisense.it"
    token: "qgkGXvOlp_Gj0veF-ewe8FSJGGCxQQoh0EfMg-Po9Bd8Vzw2iz8Y6d-Z2DE0hqojiGgIsMWJrsbqFjV6-Mi4Zw=="
    org: "Digiplus"
    bucket: "health_data"
    measurement: "ZPHSensor_sensore"
    tags:
      sensor: "ZPHS01B"
      host: "raspberry01"
      lampada: "88a29e6f9779"
      stanza: "Ufficio1_ProtoDesign"
      client_id: "57"
  ipc:
    method: "sqlite"  # or "redis"
    db_path: "/tmp/digihealth.db"

web:
  enabled: true  
  host: "0.0.0.0"  #192.168.0.104
  port: 5000

logging:
  level: "INFO"
  file: "~/digihealth-lamp.log"